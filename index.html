<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zimagination | Voces y Memorias de Zámbiza</title>
    
    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wtdbnomblg");
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Tipografía personalizada para un look más editorial y cultural */
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc; /* slate-50 (Lienzo blanco premium) */
            color: #0f172a; /* slate-900 (Lectura óptima oscura) */
        }
        
        .font-serif-quote {
            font-family: 'Merriweather', serif;
        }

        /* Ocultar scrollbar pero mantener funcionalidad para galerías horizontales */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Efecto de Paralaje Dinámico para el Fondo de la Iglesia */
        .parallax-bg {
            background-attachment: fixed;
            background-position: center 25%;
            background-repeat: no-repeat;
            background-size: cover;
        }

        /* En dispositivos móviles desactivamos el paralaje para optimizar el rendimiento de batería y scroll */
        @media (max-width: 768px) {
            .parallax-bg {
                background-attachment: scroll;
                background-position: center center;
            }
        }
    </style>
</head>
<body class="overflow-x-hidden antialiased selection:bg-red-600 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        // URLs oficiales de recursos gráficos del proyecto y enlaces externos
        const ASSETS = {
            LOGO_ZAMBIZA: "https://www.gadzambiza.gob.ec/media/pictures/web/inicio/logoZambiza.png",
            IGLESIA_FONDO: "https://raw.githubusercontent.com/alexzanderj14/Vonces-y-memorias-de-Zambiza/main/igle.jpeg",
            ENCUESTA_LINK: "https://docs.google.com/forms/d/e/1FAIpQLSdWRTgOaAP64EzZBj8EF9O3hIc-xHGkjO2J9ETo1cdgNdi0nQ/viewform?usp=header"
        };

        const CONTENT = {
            categories: [
                { id: 'all', label: 'Todo el Contenido' },
                { id: 'historia', label: 'Historia y Origen' },
                { id: 'vestimenta', label: 'Significado de la Vestimenta' },
                { id: 'musica', label: 'Música y Ritmos' },
                { id: 'personajes', label: 'Personajes de la Danza' },
                { id: 'costumbres', label: 'Costumbres y Fiestas' }
            ],
            videos: [
                {
                    id: 'main-1',
                    videoId: 'xu2tHJEPmK0',
                    title: 'El Despertar del Danzante: Tradición Viva',
                    category: 'personajes',
                    thumbnail: 'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&q=80&w=1200',
                    description: 'Conoce la preparación espiritual y física de los danzantes de Zámbiza antes de la gran fiesta patronal. Un viaje íntimo a la devoción.',
                    duration: '08:45',
                    isFeatured: true
                },
                {
                    id: 'v-2',
                    videoId: 'JI7gdhuPSdk',
                    title: 'Hilos que Cuentan Historias: La Vestimenta',
                    category: 'vestimenta',
                    thumbnail: 'https://images.unsplash.com/photo-1605806616949-1e87b487bc2a?auto=format&fit=crop&q=80&w=800',
                    description: 'Cada color y bordado tiene un porqué. Las tejedoras locales nos explican el simbolismo oculto en los trajes festivos.',
                    duration: '04:20'
                },
                {
                    id: 'v-3',
                    videoId: 'gzucud8JqAc',
                    title: 'El Ritmo de la Tierra: Pingullo y Tambor',
                    category: 'musica',
                    thumbnail: 'https://images.unsplash.com/photo-1516280440502-861614917637?auto=format&fit=crop&q=80&w=800',
                    description: 'Descubre los instrumentos autóctonos que marcan el paso de nuestras celebraciones desde tiempos inmemoriales.',
                    duration: '05:15'
                },
                {
                    id: 'v-4',
                    videoId: 'xu2tHJEPmK0',
                    title: 'Orígenes: La Fundación de Zámbiza',
                    category: 'historia',
                    thumbnail: 'https://images.unsplash.com/photo-1461344577544-4e5dc9487184?auto=format&fit=crop&q=80&w=800',
                    description: 'Un recorrido por los hitos históricos que forjaron el carácter de nuestra parroquia más antigua.',
                    duration: '12:30'
                }
            ],
            testimonials: [
                {
                    id: 't-1',
                    quote: "Nosotros no bailamos para que nos aplaudan, bailamos porque en cada paso la tierra nos recuerda quiénes somos. Si dejamos de danzar, el pueblo olvida.",
                    author: "Don Segundo Guamán",
                    role: "Danzante Mayor, 68 años",
                    image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=400"
                },
                {
                    id: 't-2',
                    quote: "Los jóvenes miran el teléfono buscando héroes, pero los verdaderos héroes están aquí, tejiendo la historia con hilos de colores en nuestros propios patios.",
                    author: "María Rosa Tituaña",
                    role: "Artesana Textil",
                    image: "https://images.unsplash.com/photo-1531123897727-8f129e1688ce?auto=format&fit=crop&q=80&w=400"
                }
            ]
        };

        const Icons = {
            Play: () => <svg className="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
            Youtube: () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>,
            Institution: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>,
            Quote: () => <svg className="w-12 h-12 text-teal-500/10" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>,
            Survey: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        };

        const App = () => {
            const [activeCategory, setActiveCategory] = React.useState('all');
            const [selectedVideo, setSelectedVideo] = React.useState(null);

            const filteredVideos = React.useMemo(() => {
                if (activeCategory === 'all') return CONTENT.videos.filter(v => !v.isFeatured);
                return CONTENT.videos.filter(v => v.category === activeCategory && !v.isFeatured);
            }, [activeCategory]);

            const featuredVideo = CONTENT.videos.find(v => v.isFeatured);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 selection:bg-red-600 selection:text-white">
                    
                    {/* HEADER MODERNO BLANCO CON LOGO CORPORATIVO GIGANTE */}
                    <nav className="fixed w-full z-40 bg-white/95 backdrop-blur-xl border-b border-slate-200/80 shadow-sm transition-all">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            {/* Logo institucional GAD Zámbiza apilado sobre Zimagination (Ampliación y excelente visibilidad) */}
                            <div className="flex flex-col items-start gap-2">
                                <a href="#" className="hover:opacity-90 transition-opacity">
                                    <img 
                                        src={ASSETS.LOGO_ZAMBIZA} 
                                        alt="GAD Parroquial de Zámbiza" 
                                        className="h-20 md:h-24 w-auto object-contain drop-shadow-[0_2px_10px_rgba(0,0,0,0.06)]" 
                                    />
                                </a>
                                <h1 className="text-xl md:text-2xl font-extrabold tracking-tighter text-slate-900 leading-none">
                                    Zimagination<span className="text-red-500">.</span>
                                </h1>
                            </div>

                            <div className="flex items-center gap-4">
                                <a 
                                    href={ASSETS.ENCUESTA_LINK} 
                                    target="_blank" 
                                    className="hidden md:flex items-center gap-2 text-sm font-bold text-slate-600 hover:text-teal-600 transition-colors"
                                >
                                    <Icons.Youtube /> Canal Oficial GAD de Zámbiza
                                </a>
                                <button className="md:hidden text-slate-800 hover:text-red-500 transition-colors">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* HERO SECTION: FUSIONADO CON LA IGLESIA DE FONDO OPTIMIZADO PARA MÁXIMA CLARIDAD */}
                    <section 
                        className="relative pt-44 pb-20 lg:pt-56 lg:pb-32 px-6 overflow-hidden min-h-[90vh] flex items-center parallax-bg"
                        style={{ backgroundImage: `url(${ASSETS.IGLESIA_FONDO})` }}
                    >
                        {/* Filtro sutil general que unifica los tonos de la imagen con el diseño claro */}
                        <div className="absolute inset-0 z-0 bg-slate-900/5"></div>
                        {/* Difuminado suave en la base y laterales para fusionar la imagen suavemente con la estructura blanca de la página */}
                        <div className="absolute inset-0 z-0 bg-gradient-to-t from-slate-50 via-slate-50/20 to-transparent"></div>
                        <div className="absolute inset-0 z-0 bg-gradient-to-r from-slate-50/30 via-transparent to-transparent"></div>

                        {/* Brillos suaves decorativos basados en los colores de la marca */}
                        <div className="absolute top-1/4 left-1/4 w-80 h-80 bg-red-500/5 rounded-full blur-[100px] pointer-events-none animate-pulse"></div>
                        <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500/5 rounded-full blur-[120px] pointer-events-none animate-pulse"></div>

                        <div className="relative z-10 max-w-7xl mx-auto w-full grid lg:grid-cols-12 gap-12 items-center">
                            {/* Caja de contenido con Glassmorphism premium (desenfoque de cristal blanco) que protege las letras y permite ver la iglesia a un 100% de nitidez */}
                            <div className="lg:col-span-8 space-y-8 bg-white/75 backdrop-blur-md p-8 md:p-12 rounded-[2.5rem] border border-white/60 shadow-xl shadow-slate-200/50">
                                <div className="inline-flex items-center gap-2 px-3 py-1 bg-red-50 text-red-600 border border-red-200 text-[10px] font-black uppercase tracking-widest rounded-full shadow-sm">
                                    <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                    Patrimonio de Zámbiza
                                </div>
                                <h2 className="text-4xl lg:text-6xl font-extrabold tracking-tighter leading-[1.1] text-slate-900">
                                    {featuredVideo.title}
                                </h2>
                                <p className="text-slate-700 text-base lg:text-lg leading-relaxed font-serif-quote">
                                    {featuredVideo.description}
                                </p>
                                <div className="flex flex-col sm:flex-row gap-4 pt-4">
                                    <button 
                                        onClick={() => setSelectedVideo(featuredVideo)}
                                        className="flex items-center justify-center gap-2 bg-gradient-to-r from-red-600 to-teal-500 text-white px-8 py-4 rounded-full font-bold text-sm uppercase tracking-wide hover:from-red-500 hover:to-teal-400 hover:scale-105 transition-all shadow-lg shadow-red-500/20"
                                    >
                                        <Icons.Play /> Reproducir Cápsula
                                    </button>
                                    <a 
                                        href={ASSETS.ENCUESTA_LINK}
                                        target="_blank"
                                        className="flex items-center justify-center gap-2 bg-teal-50 hover:bg-teal-100 text-teal-700 border border-teal-200 px-8 py-4 rounded-full font-bold text-sm uppercase tracking-wide transition-all text-center shadow-sm"
                                    >
                                        <Icons.Survey /> Responder Encuesta
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ARQUITECTURA DE INFORMACIÓN: NAVEGACIÓN POR CATEGORÍAS STICKY */}
                    <section id="galeria" className="border-t border-b border-slate-200 bg-white/95 sticky top-[130px] md:top-[140px] z-30 backdrop-blur-md shadow-sm">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
                                {CONTENT.categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveCategory(cat.id)}
                                        className={`whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold transition-all ${
                                            activeCategory === cat.id 
                                            ? 'bg-gradient-to-r from-red-600 to-teal-600 text-white shadow-md shadow-teal-600/20' 
                                            : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:text-slate-900'
                                        }`}
                                    >
                                        {cat.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* GALERÍA MULTIMEDIA (GRILLA SOBRE BLANCO) */}
                    <main className="max-w-7xl mx-auto px-6 py-16">
                        <div className="flex justify-between items-end mb-10">
                            <div>
                                <h3 className="text-3xl font-extrabold text-slate-900 tracking-tight">Memoria Audiovisual</h3>
                                <p className="text-slate-500 mt-2 font-serif-quote italic">Explora la identidad de Zámbiza a través de sus protagonistas.</p>
                            </div>
                        </div>

                        {filteredVideos.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-3xl border border-slate-200/80 shadow-sm">
                                <p className="text-slate-500 font-bold">Aún no hay cápsulas en esta categoría.</p>
                            </div>
                        ) : (
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
                                {filteredVideos.map(video => (
                                    <article 
                                        key={video.id} 
                                        onClick={() => setSelectedVideo(video)} 
                                        className="group cursor-pointer flex flex-col gap-4 bg-white p-4 rounded-3xl border border-slate-200/80 hover:border-teal-500/30 hover:shadow-xl transition-all duration-300"
                                    >
                                        {/* Thumbnail con efecto cinematográfico */}
                                        <div className="relative aspect-video rounded-2xl overflow-hidden bg-slate-900">
                                            <img 
                                                src={video.thumbnail} 
                                                className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-90 group-hover:opacity-100" 
                                            />
                                            <div className="absolute inset-0 bg-slate-950/10 group-hover:bg-transparent transition-colors"></div>
                                            
                                            {/* Etiqueta de duración y categoría */}
                                            <div className="absolute bottom-3 right-3 bg-black/85 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-1 rounded">
                                                {video.duration}
                                            </div>
                                            <div className="absolute top-3 left-3 bg-gradient-to-r from-red-600 to-teal-600 backdrop-blur-sm text-white text-[9px] uppercase tracking-widest font-black px-3 py-1 rounded-full shadow-sm">
                                                {CONTENT.categories.find(c => c.id === video.category)?.label}
                                            </div>
                                            
                                            {/* Play button overlay */}
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                                <div className="w-16 h-16 bg-gradient-to-tr from-red-600/90 to-teal-500/90 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/20 shadow-lg">
                                                    <Icons.Play />
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* Info del video */}
                                        <div className="px-1 py-1">
                                            <h4 className="text-lg font-bold text-slate-900 leading-tight group-hover:text-teal-600 transition-colors mb-2">
                                                {video.title}
                                            </h4>
                                            <p className="text-slate-500 text-sm line-clamp-2 leading-relaxed">
                                                {video.description}
                                            </p>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* SECCIÓN DE TESTIMONIOS: "ROSTROS DE LA MEMORIA" (Fondo gris suave) */}
                    <section className="bg-slate-100/70 border-y border-slate-200 py-24 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <h3 className="text-sm font-black text-red-600 uppercase tracking-[0.3em] mb-4">Voces de la Comunidad</h3>
                                <h2 className="text-4xl md:text-5xl font-extrabold text-slate-900">Nuestra historia en primera persona</h2>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-12 lg:gap-20">
                                {CONTENT.testimonials.map(testimony => (
                                    <div key={testimony.id} className="relative bg-white p-8 md:p-12 rounded-[2rem] border border-slate-200/80 hover:border-teal-500/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="absolute top-8 left-8"><Icons.Quote /></div>
                                        <p className="relative z-10 text-xl md:text-2xl text-slate-700 font-serif-quote italic leading-relaxed mb-10 pt-8">
                                            "{testimony.quote}"
                                        </p>
                                        <div className="flex items-center gap-5 border-t border-slate-200/80 pt-6">
                                            <img src={testimony.image} alt={testimony.author} className="w-16 h-16 rounded-full object-cover border-2 border-slate-200" />
                                            <div>
                                                <h4 className="text-slate-900 font-bold text-lg">{testimony.author}</h4>
                                                <p className="text-teal-600 text-sm font-semibold">{testimony.role}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ECOSISTEMA DIGITAL: FOOTER Y CTAs (Luminoso, limpio y con encuesta incorporada) */}
                    <footer className="bg-white py-20 px-6 border-t border-slate-200 relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-teal-500/5 blur-[120px] rounded-full pointer-events-none"></div>
                        
                        <div className="max-w-4xl mx-auto text-center relative z-10">
                            <h2 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-6">Tu voz construye el legado</h2>
                            <p className="text-slate-500 text-lg mb-10 max-w-2xl mx-auto">
                                Te invitamos a completar nuestra Encuesta de Percepción Ciudadana. Tu opinión es el motor principal para seguir rescatando la historia, arte y tradiciones de Zámbiza.
                            </p>
                            
                            <div className="flex flex-col lg:flex-row justify-center items-center gap-4 mb-20">
                                <a 
                                    href={ASSETS.ENCUESTA_LINK} 
                                    target="_blank"
                                    className="w-full lg:w-auto flex items-center justify-center gap-3 bg-gradient-to-r from-teal-600 to-emerald-500 text-white px-8 py-4 rounded-xl font-bold hover:from-teal-500 hover:to-emerald-400 transition-all shadow-md shadow-teal-500/20"
                                >
                                    <Icons.Survey /> Llenar Encuesta Ciudadana
                                </a>
                                <a 
                                    href={ASSETS.ENCUESTA_LINK} 
                                    target="_blank"
                                    className="w-full lg:w-auto flex items-center justify-center gap-3 bg-red-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-red-700 transition-colors shadow-md shadow-red-500/10"
                                >
                                    <Icons.Youtube /> Canal Oficial GAD de Zámbiza
                                </a>
                                <a 
                                    href="https://www.gadzambiza.gob.ec/" 
                                    target="_blank"
                                    className="w-full lg:w-auto flex items-center justify-center gap-3 bg-slate-100 hover:bg-slate-200 text-slate-800 px-8 py-4 rounded-xl font-bold transition-colors border border-slate-300/60"
                                >
                                    <Icons.Institution /> Web Oficial GAD Zámbiza
                                </a>
                            </div>
                            
                            <div className="border-t border-slate-200 pt-10 flex flex-col md:flex-row justify-between items-center gap-6">
                                <div className="flex flex-col items-center md:items-start gap-1">
                                    <img 
                                        src={ASSETS.LOGO_ZAMBIZA} 
                                        alt="GAD Parroquial" 
                                        className="h-12 w-auto object-contain drop-shadow-sm" 
                                    />
                                    <h1 className="text-xl font-extrabold text-slate-900 opacity-80 leading-none mt-1">
                                        Zimagination<span className="text-red-500">.</span>
                                    </h1>
                                </div>
                                <p className="text-slate-500 text-sm text-center md:text-right">
                                    © 2026 Zimagination Cultural.<br/> Un proyecto avalado por el GAD Zámbiza.
                                </p>
                            </div>
                        </div>
                    </footer>

                    {/* MODAL REPRODUCTOR */}
                    {selectedVideo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-950/90 backdrop-blur-xl">
                            <div className="bg-white w-full max-w-5xl rounded-3xl overflow-hidden shadow-2xl relative flex flex-col border border-slate-200 max-h-[95vh] animate-[fadeIn_0.2s_ease-out]">
                                
                                {/* Header del Modal */}
                                <div className="flex justify-between items-center p-4 border-b border-slate-200">
                                    <span className="text-red-500 text-xs font-black uppercase tracking-widest px-2">
                                        {CONTENT.categories.find(c => c.id === selectedVideo.category)?.label}
                                    </span>
                                    <button 
                                        onClick={() => setSelectedVideo(null)} 
                                        className="w-10 h-10 bg-slate-100 text-slate-800 rounded-full flex items-center justify-center hover:bg-red-600 hover:text-white transition-colors font-bold shadow-sm"
                                    >
                                        ✕
                                    </button>
                                </div>

                                {/* Contenedor del Iframe 16:9 */}
                                <div className="w-full bg-black aspect-video relative">
                                    <iframe 
                                        className="absolute inset-0 w-full h-full" 
                                        src={`https://www.youtube.com/embed/${selectedVideo.videoId}?autoplay=1`} 
                                        frameBorder="0" 
                                        allow="autoplay; encrypted-media; picture-in-picture" 
                                        allowFullScreen
                                    ></iframe>
                                </div>

                                {/* Info y CTA dentro del Modal */}
                                <div className="p-6 md:p-8 bg-slate-50 flex flex-col md:flex-row justify-between items-start gap-6 overflow-y-auto">
                                    <div className="max-w-2xl">
                                        <h3 className="text-2xl font-extrabold text-slate-900 mb-3">{selectedVideo.title}</h3>
                                        <p className="text-slate-600 text-sm leading-relaxed font-serif-quote">
                                            {selectedVideo.description}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => window.open(`https://www.youtube.com/watch?v=${selectedVideo.videoId}`, '_blank')} 
                                        className="w-full md:w-auto flex-shrink-0 flex items-center justify-center gap-2 bg-gradient-to-r from-red-600 to-teal-500 text-white px-6 py-3 rounded-xl font-bold text-sm uppercase hover:from-red-500 hover:to-teal-400 transition-all whitespace-nowrap shadow-md shadow-red-900/10"
                                    >
                                        <Icons.Youtube /> Apoyar en YouTube
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
